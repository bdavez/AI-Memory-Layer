<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Datacenter Control Plane</title>
  <link rel="stylesheet" href="css/neon.css" />
</head>

<body>
  <header class="cp-header">
    <h1>DATACENTER CONTROL PLANE</h1>
  </header>

  <main class="cp-main">

    <!-- LEFT COLUMN -->
    <section class="cp-status-panel">
      <h2>Status</h2>

      <div id="status-indicator" class="status-indicator status-unknown">
        <span class="status-label">Unknown</span>
      </div>

      <div id="status-details">Waiting for status…</div>

      <h3>Machines</h3>

<!-- Machine Filter Dropdown (required by status.js) -->
      <div class="machine-selector">
        <label for="machine-select">Filter:</label>
        <select id="machine-select"></select>
      </div>

      <div id="machine-table"></div>

      <h3>Heartbeats</h3>
      <div id="heartbeat-pane"></div>
    </section>
    <div id="gpu-cluster-summary"></div>
    <!-- RIGHT COLUMN -->
    <section class="cp-operator-panel">
      <h2>Operator Actions</h2>

      <button class="op-button" data-action="refresh-status">Refresh Status</button>
      <button class="op-button" data-action="open-code-assistant">Code Assistant</button>

      <!-- Existing inline memory panel -->
      <button class="op-button" data-action="view-memory">Memory</button>

      <!-- NEW: Full Memory Debug Panel -->
      <button class="op-button" data-action="open-memory-debug">Memory Debug</button>

      <button class="op-button" data-action="view-jobs">Jobs</button>

      <!-- MEMORY PANEL -->
      <div id="memory-pane" style="display:none; margin-top:20px;">
        <h2>User Memory</h2>

        <div id="memory-facts-container"></div>
      </div>

      <!-- JOBS PANEL -->
      <div id="jobs-pane" style="display:none; margin-top:20px;">
        <h2>Jobs</h2>
        <div id="jobs-content">Loading jobs…</div>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div id="modal-container" class="modal-container hidden">
    <div class="modal-backdrop"></div>
    <div class="modal">
      <h2 id="modal-title">Modal</h2>
      <div id="modal-body"></div>
      <button id="modal-close" class="op-button">Close</button>
    </div>
  </div>

  <!-- JS MODULES -->
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/status.js"></script>
  <script type="module" src="js/buttons.js"></script>
  <script type="module" src="js/memory.js"></script>
  <script type="module" src="js/jobs.js"></script>
  <script type="module" src="js/main.js"></script>

</body>
</html>
