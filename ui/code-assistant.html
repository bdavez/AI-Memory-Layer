<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Assistant · Datacenter</title>
  <link rel="stylesheet" href="css/neon.css">

  <style>
    /* Your existing neon styling preserved exactly */
    #ca-refresh-models {
      background: linear-gradient(135deg, #0ff, #f0f);
      color: black;
      font-weight: bold;
      border: 2px solid #0ff;
      border-radius: 6px;
      padding: 6px 12px;
      box-shadow: 0 0 8px #0ff, 0 0 4px #f0f;
      text-shadow: 0 0 2px #000;
      transition: all 0.2s ease-in-out;
      cursor: pointer;
    }
    #ca-refresh-models:hover {
      background: linear-gradient(135deg, #f0f, #0ff);
      box-shadow: 0 0 12px #f0f, 0 0 6px #0ff;
      transform: scale(1.05);
    }

    .ca-root {
      max-width: 1100px;
      margin: 24px auto;
      padding: 16px 20px;
      border-radius: 8px;
      background: radial-gradient(circle at top left, #151a33, #050711 60%);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.15);
      border: 1px solid rgba(0, 255, 255, 0.25);
      color: #e5e9ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .ca-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 16px;
    }

    .ca-title {
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7df9ff;
    }

    .ca-subtitle {
      font-size: 0.85rem;
      color: #9fa8ff;
    }

    .ca-main {
      display: grid;
      grid-template-columns: 1.1fr 1.2fr;
      gap: 16px;
    }

    .ca-panel {
      padding: 12px 14px;
      border-radius: 6px;
      background: rgba(5, 10, 30, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.08);
    }

    .ca-panel h2 {
      margin: 0 0 8px 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9fa8ff;
    }

    .ca-field-label {
      font-size: 0.8rem;
      color: #b0bec5;
      margin-bottom: 4px;
    }

    .ca-textarea,
    .ca-select {
      width: 100%;
      background: rgba(5, 10, 30, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.4);
      color: #e5e9ff;
      font-size: 0.85rem;
      padding: 6px 8px;
      border-radius: 4px;
      resize: vertical;
      font-family: "Fira Code", monospace;
    }

    .ca-textarea {
      min-height: 160px;
    }

    .ca-select {
      margin-bottom: 8px;
    }

    .ca-button-bar {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .ca-button {
      padding: 8px 14px;
      border-radius: 4px;
      border: 1px solid rgba(0, 255, 255, 0.4);
      background: linear-gradient(135deg, rgba(10, 20, 40, 0.95), rgba(5, 10, 25, 0.95));
      color: #e5e9ff;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.06s ease;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.25);
    }

    .ca-button:hover {
      background: linear-gradient(135deg, rgba(20, 40, 80, 1), rgba(10, 20, 50, 1));
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.45);
      transform: translateY(-1px);
    }

    .ca-output {
      width: 100%;
      min-height: 260px;
      background: rgba(5, 10, 20, 0.95);
      border-radius: 4px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      padding: 8px 10px;
      font-family: "Fira Code", monospace;
      font-size: 0.8rem;
      color: #e5e9ff;
      white-space: pre-wrap;
      overflow-y: auto;
    }

    .ca-status-line {
      margin-top: 6px;
      font-size: 0.75rem;
      color: #9fa8ff;
      opacity: 0.85;
    }

    .ca-user-select select {
      background: rgba(5,10,30,0.9);
      border: 1px solid rgba(0,255,255,0.4);
      color: #e5e9ff;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>

</head>

<body>
  <div class="ca-root">

    <header class="ca-header">
      <div class="ca-title">Code Assistant</div>
      <div class="ca-subtitle">Your Chat Assistant: Personalized</div>
    </header>

    <main class="ca-main">

      <!-- LEFT PANEL -->
      <section class="ca-panel">
        <div class="ca-user-select">
          <label for="ca-user">User:</label>
          <select id="ca-user"></select>
        </div>

        <h2>Prompt</h2>

        <div class="ca-field-label">Model</div>
        <select id="ca-model" class="ca-select"></select>
        <button id="ca-refresh-models">Refresh Models</button>

        <label for="ca-mode">Mode:</label>
        <select id="ca-mode" class="ca-select">
          <option value="standard">Standard</option>
          <option value="diff">Diff Mode</option>
        </select>

        <div class="ca-field-label">Instruction / Code Context</div>
        <textarea id="ca-prompt" class="ca-textarea" placeholder="Describe what you want, or paste code to refactor..."></textarea>

        <div class="ca-button-bar">
          <button id="ca-run" class="ca-button">Run</button>
          <button id="ca-clear" class="ca-button">Clear</button>
        </div>

        <div id="ca-status" class="ca-status-line">Ready.</div>
      </section>

      <!-- RIGHT PANEL -->
      <section class="ca-panel">
        <h2>Assistant Output</h2>

        <label for="output-mode">Output Mode:</label>
        <select id="output-mode" class="ca-select">
          <option value="chat">Chatbox</option>
          <option value="terminal">Terminal</option>
        </select>

        <div id="auto-clear-wrapper">
          <label for="auto-clear">Auto Clear on Run:</label>
          <select id="auto-clear" class="ca-select">
            <option value="off">Off</option>
            <option value="on">On</option>
          </select>
        </div>

        <div class="ca-button-bar">
          <button id="copy-output" class="ca-button">Copy Output</button>
          <button id="download-output" class="ca-button">Download Chat</button>
        </div>

        <div id="ca-output" class="ca-output"></div>
        <div id="terminal" style="width:100%; height:300px;"></div>

      </section>

    </main>
  </div>

  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/code_assistant.js"></script>
</body>
</html>
